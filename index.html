<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="icon.png" type="image/png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리들의 코드 저장소</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo" id="home-logo" onclick="location.reload()" style="cursor:pointer">LifeIsSource</div>
        <div id="auth-section"></div>
    </nav>

    <div class="container">
        <div class="left-ad-area">
            <ins class="kakao_ad_area" style="display:none;" 
                 data-ad-unit = "DAN-OuHdAcOa5mnBk4SJ" 
                 data-ad-width = "160" 
                 data-ad-height = "600"></ins>
            <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
        </div>

        <main id="main-content">
            <div id="user-profile-header" style="display: none;"></div>

            <div id="write-toggle-area" style="text-align: center; margin-bottom: 20px;">
                <button id="open-write-btn" style="width: 100%; max-width: 400px; font-size: 1.1rem; padding: 15px;">+ 코드쓰기</button>
            </div>

            <div class="write-card" id="write-area" style="display: none;">
                <div class="card-header">
                    <h3>새 코드 공유하기</h3>
                    <select id="language-select">
                        <option value="plaintext">언어 선택</option>
                        <option value="c">C</option>
                        <option value="cpp">C++</option>
                        <option value="python">Python</option>
                        <option value="c#">C#</option>
                        <option value="java">Java</option>
                        <option value="javascript">JavaScript</option>
                    </select>
                </div>
                <textarea id="code-input" placeholder="여기에 소스코드를 입력하세요..."></textarea>
                <input type="text" id="desc-input" placeholder="코드에 대한 간단한 설명을 적어주세요.">
                <div class="actions">
                    <button id="cancel-write-btn" style="background: #555; margin-right: 10px;">취소</button>
                    <button id="post-btn">공유하기</button>
                </div>
            </div>

            <div class="sort-options" id="sort-area">
                <button id="sort-latest" class="active">최신순</button>
                <button id="sort-popular">인기순</button>
                <button id="sort-follow">팔로우</button>
            </div>

            <div id="feed"></div>

            <div class="mobile-bottom-ad">
                <ins class="kakao_ad_area" style="display:none;" 
                     data-ad-unit = "DAN-1PY9GjZ2cJSPGtYE" 
                     data-ad-width = "320" 
                     data-ad-height = "100"></ins>
                <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
            </div>
        </main>

        <aside class="sidebar" id="follow-sidebar">
            <div class="sidebar-section">
                <h4>팔로우 목록</h4>
                <div id="follow-list">로그인이 필요합니다.</div>
            </div>
        </aside>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
