<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; 
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://www.gstatic.com https://www.googletagmanager.com https://cdnjs.cloudflare.com https://t1.daumcdn.net https://t1.kakaocdn.net; 
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; 
        font-src 'self' https://fonts.gstatic.com; 
        img-src 'self' data: https: https://t1.daumcdn.net https://t1.kakaocdn.net https://lh3.googleusercontent.com; 
        connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://identitytoolkit.googleapis.com https://*.kakaocdn.net https://*.daumcdn.net; 
        frame-src 'self' https://lifeissource.firebaseapp.com https://apis.google.com https://*.akamaized.net;">
    
    <link rel="icon" href="icon.png" type="image/png">
    <meta name="description" content="우리들의 코드 저장소, LifeIsSource. 누구나 자유롭게 코드를 공유하고 함께 성장하는 오픈소스 개발자 커뮤니티입니다.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리들의 코드 저장소</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* 광고 영역 반응형 제어 */
        .left-ad-area { display: block; }
        .mobile-bottom-ad { display: none; margin: 20px 0; text-align: center; }

        @media (max-width: 768px) {
            .left-ad-area { display: none; } /* 모바일에서는 왼쪽 배너 숨김 */
            .mobile-bottom-ad { display: block; } /* 모바일에서만 띠 배너 노출 */
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo" id="home-logo" onclick="location.reload()" style="cursor:pointer">LifeIsSource</div>
        <div id="auth-section" style="display: flex; align-items: center; gap: 10px;"></div>
    </nav>

    <div class="container">
        <div class="left-ad-area">
            <ins class="kakao_ad_area" style="display:none;" 
                 data-ad-unit = "DAN-OuHdAcOa5mnBk4SJ" 
                 data-ad-width = "160" 
                 data-ad-height = "600"></ins>
            <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
        </div>

        <main id="main-content">
            <div id="user-profile-header" style="display: none;"></div>

            <div id="write-toggle-area" style="text-align: center; margin-bottom: 20px;">
                <button id="open-write-btn" style="width: 100%; max-width: 400px; font-size: 1.1rem; padding: 15px;">+ 코드쓰기</button>
            </div>

            <div id="feed"></div>

            <div class="mobile-bottom-ad">
                <ins class="kakao_ad_area" style="display:none;" 
                     data-ad-unit = "DAN-1PY9GjZ2cJSPGtYE" 
                     data-ad-width = "320" 
                     data-ad-height = "100"></ins>
                <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
            </div>
        </main>

        <aside class="sidebar" id="follow-sidebar">
            <div class="sidebar-section">
                <h4>팔로우 목록</h4>
                <div id="follow-list">로그인이 필요합니다.</div>
            </div>
            
            <div class="sidebar-section" style="margin-top: 20px;">
                <h4>📢 공지사항</h4>
                <div id="notice-list" style="font-size: 0.9rem; color: #ccc;">
                    공지사항이 없습니다.
                </div>
            </div>
        </aside>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
