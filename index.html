<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; 
        script-src 'self' 'unsafe-inline' https://apis.google.com https://www.gstatic.com https://www.googletagmanager.com https://cdnjs.cloudflare.com https://t1.daumcdn.net; 
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; 
        font-src 'self' https://fonts.gstatic.com; 
        img-src 'self' data: https: https://t1.daumcdn.net; 
        connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://identitytoolkit.googleapis.com; 
        frame-src 'self' https://lifeissource.firebaseapp.com https://apis.google.com;">
    
    <link rel="icon" href="icon.png" type="image/png">

    <meta name="description" content="우리들의 코드 저장소, LifeIsSource. 누구나 자유롭게 코드를 공유하고 함께 성장하는 오픈소스 개발자 커뮤니티입니다.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리들의 코드 저장소</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo" id="home-logo" onclick="location.reload()" style="cursor:pointer">LifeIsSource</div>
        <div id="auth-section" style="display: flex; align-items: center; gap: 10px;">
            </div>
    </nav>

    <div class="container">
        <div class="left-ad-area">
            <ins class="kakao_ad_area" style="display:none;" 
                 data-ad-unit = "DAN-OuHdAcOa5mnBk4SJ" 
                 data-ad-width = "160" 
                 data-ad-height = "600"></ins>
            <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
        </div>

        <main id="main-content">
            <div id="user-profile-header" style="display: none;"></div>

            <div id="write-toggle-area" style="text-align: center; margin-bottom: 20px;">
                <button id="open-write-btn" style="width: 100%; max-width: 400px; font-size: 1.1rem; padding: 15px;">+ 코드쓰기</button>
            </div>

            <div class="write-card" id="write-area" style="display: none;">
                <div class="card-header">
                    <h3>새 코드 공유하기</h3>
                    <select id="language-select">
                        <option value="plaintext">언어 선택</option>
                        <option value="c">C</option>
                        <option value="cpp">C++</option>
                        <option value="python">Python</option>
                        <option value="c#">C#</option>
                        <option value="java">Java</option>
                        <option value="javascript">JavaScript</option>
                    </select>
                </div>
                <textarea id="code-input" placeholder="여기에 소스코드를 입력하세요..."></textarea>
                <input type="text" id="desc-input" placeholder="코드에 대한 간단한 설명을 적어주세요.">
                <div class="actions" style="display: flex; align-items: center; justify-content: flex-end;">
                    <label id="notice-label" style="display: none; color: #ffffff; margin-right: auto; cursor: pointer; font-size: 0.9rem; align-items: center;">
                        <input type="checkbox" id="is-notice-checkbox" style="vertical-align: middle; margin-right: 5px;"> 공지사항
                    </label>
                    <button id="cancel-write-btn" style="background: #555; margin-right: 10px;">취소</button>
                    <button id="post-btn">공유하기</button>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 15px;">
                <div class="sort-options" id="sort-area" style="margin-bottom: 0; flex-shrink: 0;">
                    <button id="sort-latest" class="active">최신순</button>
                    <button id="sort-popular">인기순</button>
                    <button id="sort-follow">팔로우</button>
                </div>

                <div class="mobile-search-area" style="flex-grow: 1;">
                    <input type="text" id="mobile-search-input" placeholder="찾고 싶은 코드를 검색해 보세요" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #4caf50; background: #1e1e1e; color: #fff; box-sizing: border-box;">
                </div>
            </div>

            <div id="feed"></div>

            <div class="mobile-bottom-ad">
                <ins class="kakao_ad_area" style="display:none;" 
                     data-ad-unit = "DAN-1PY9GjZ2cJSPGtYE" 
                     data-ad-width = "320" 
                     data-ad-height = "100"></ins>
                <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
            </div>
        </main>

        <aside class="sidebar" id="follow-sidebar">
            <div class="sidebar-section">
                <h4>팔로우 목록</h4>
                <div id="follow-list">로그인이 필요합니다.</div>
            </div>
            <div class="sidebar-section" style="margin-top: 20px;">
                <h4>📢 공지사항</h4>
                <div id="notice-list" style="font-size: 0.9rem; color: #ccc;">공지사항이 없습니다.</div>
            </div>
        </aside>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
