<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeShare - 우리들의 코드 저장소</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">CodeShare</div>
        <div id="auth-section">
            </div>
    </nav>

    <main>
        <div class="write-card">
            <h3>새 코드 공유하기</h3>
            <textarea id="code-input" placeholder="여기에 소스코드를 입력하세요..."></textarea>
            <div class="actions">
                <button id="post-btn">공유하기</button>
            </div>
        </div>

        <div id="feed"></div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
